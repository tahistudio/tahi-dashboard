name: MCP worker deploy

# Auto-deploys workers/mcp-server to Cloudflare whenever its source changes.
# The dashboard itself ships via Webflow Cloud, but the MCP worker is a
# separate Cloudflare Worker that needs its own deploy lifecycle. Keeping
# this in CI means MCP tool changes go live the same way as dashboard
# changes — push to main → live in a couple of minutes.
#
# Required GitHub repo secrets:
#   - CLOUDFLARE_API_TOKEN  — a token with Worker Scripts: Edit on the
#     same Cloudflare account that hosts the worker. Generate via
#     https://dash.cloudflare.com/profile/api-tokens (template: "Edit
#     Cloudflare Workers").
#   - CLOUDFLARE_ACCOUNT_ID — find at the bottom of any Cloudflare
#     dashboard page (the "Account ID" field).
#
# How to trigger manually:
#   Actions → "MCP worker deploy" → Run workflow

on:
  push:
    branches: [main]
    paths:
      - 'workers/mcp-server/**'
      - '.github/workflows/mcp-worker-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: workers/mcp-server/package-lock.json

      - name: Install
        working-directory: workers/mcp-server
        run: npm ci

      - name: Type check
        # The worker doesn't ship a dedicated type-check script; run tsc
        # directly so a broken type lands as a red CI build, not a broken
        # live deploy.
        working-directory: workers/mcp-server
        run: npx tsc --noEmit

      - name: Deploy to Cloudflare
        working-directory: workers/mcp-server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # --config pins wrangler to the worker's own config — without
        # this, wrangler 4.x walked up to the repo root's wrangler.json
        # (the dashboard's OpenNext config) and tried to deploy that.
        run: npx wrangler deploy --config wrangler.jsonc
