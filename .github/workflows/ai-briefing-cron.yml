name: Daily AI Briefing

# Fires on both 19:00 UTC and 20:00 UTC every Sun-Thu so the endpoint
# catches 8am NZ time regardless of DST:
#   - 19:00 UTC = 7am NZST (Apr-Sep)  | 8am NZDT (Oct-Mar)
#   - 20:00 UTC = 8am NZST (Apr-Sep)  | 9am NZDT (Oct-Mar)
# The endpoint checks the current NZ local hour and only runs when it's
# 7 or 8, with a 3h dedup window so only one briefing is actually
# produced per morning. See Decision #043.

on:
  schedule:
    - cron: '0 19 * * SUN-THU'
    - cron: '0 20 * * SUN-THU'
  # Manual trigger for testing.
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Call briefing cron endpoint
        env:
          # The dashboard URL is stored as a GitHub repo variable (public,
          # not a secret). The cron secret is stored as a secret.
          DASHBOARD_URL: ${{ vars.TAHI_DASHBOARD_URL }}
          CRON_SECRET: ${{ secrets.TAHI_CRON_SECRET }}
        run: |
          if [ -z "$DASHBOARD_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing TAHI_DASHBOARD_URL or TAHI_CRON_SECRET secret"
            exit 1
          fi
          # The app is mounted at /dashboard (Webflow Cloud COSMIC_MOUNT_PATH).
          # Auto-append it if the configured URL doesn't already include it so
          # the variable can be set either as the bare domain or the full path.
          base="${DASHBOARD_URL%/}"
          case "$base" in
            */dashboard) url="$base/api/admin/ai/briefing/cron" ;;
            *)           url="$base/dashboard/api/admin/ai/briefing/cron" ;;
          esac
          echo "POSTing to $url"
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            "$url" \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json")
          body=$(echo "$response" | sed '$d')
          code=$(echo "$response" | tail -n1)
          echo "HTTP $code"
          echo "$body"
          if [ "$code" != "200" ]; then
            echo "::error::Briefing cron returned $code"
            exit 1
          fi
